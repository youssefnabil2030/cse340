databases:
  - name: cse340-db
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: cse340-community-service
    env: node
    plan: free
    buildCommand: bun install
    startCommand: bun start
    envVars:
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: cse340-db
          property: connectionString